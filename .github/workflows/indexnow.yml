name: IndexNow Submit

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "astro.config.mjs"
      - "keystatic.config.ts"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Submit homepage URL to IndexNow
        run: bash scripts/submit_indexnow.sh "https://www.kingdomhealth.fitness/"
